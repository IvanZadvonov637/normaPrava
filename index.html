<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./styles.css">
    <title>Normaprava37</title>
</head>
<body>
    <header class="header">

        <ul class="header-logo-list">
            <li class="header-logo-item">
                <a href="/" class="header-logo">
                    <img src="./images/-no-bg-preview_carve.png" alt="logo"
                         class="header-logo-image"
                         height="50"
                         width="50"
                         loading="lazy">
                </a>
            </li>
            <li class="header-logo-item">
                <a href="/" class="header-logo-link">
                    Услуги
                </a>
            </li>

            <li class="header-logo-item">
                <a href="/" class="header-logo-link">
                    Цены
                </a>
            </li>
            <li class="header-logo-item">
                <a href="/" class="header-logo-link">
                    Контакты
                </a>
            </li>
            <li class="header-logo-item">
                <a href="/" class="header-logo-link">
                    <img src="./icons/Telegram SVG Icon.svg"
                         alt="telegram"
                         class="header-logo-list-image"
                         width = "30" height="30"
                         loading="lazy">
                </a>
            </li>
            <li class="header-logo-item">
                <a href="/" class="header-logo-link">
                    <img src="./icons/Phone SVG Icon.svg"
                         alt="phone-number"
                         class="header-logo-list-image"
                         width = "30" height="30"
                         loading="lazy">
                </a>
            </li>
            <li class="header-logo-item">
                <a href="/" class="header-logo-link">
                    <img src="./icons/Max_logo_black.svg"
                         alt="max"
                         class="header-logo-list-image"
                         width = "30" height="30"
                         loading="lazy">
                </a>
            </li>
        </ul>
    </header>
    <main class="content">
        <h1 class="visually-hidden">Норма права</h1>
        <section class="banner">
            <h2 class="visually-hidden"> Записаться на консультацию</h2>
            <div class="banner-body">
                <div class="banner-info">
                ООО "Норма права"
                </div>
                <div class="banner-more-info">
                    Проконсультируем по любым вопросам в законодательной
                    и страховых сферах, представим ваши интересы в
                    службе финансового уполномоченного и суде.
                </div>
                <button class="banner-button"
                        type="button"
                        title="Consult">
                    Получить бесплатную консультацию
                </button>
            </div>
        </section>
    </body>
</html>
