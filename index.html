<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Normaprava37</title>
</head>
<body>
    <header class="header">

        <div class="header-logo">
            <a href="/">
                <img src="./images/-no-bg-preview_carve.png" alt="logo"
                     class="header-logo-image"
                     height="50"
                     width="50"
                     loading="lazy">
            </a>
        </div>

        <nav class="header-nav">
            <ul class="header-nav-list">
                <li><a href="/" class="header-nav-link">Услуги</a></li>
                <li><a href="/" class="header-nav-link">Цены</a></li>
                <li><a href="/" class="header-nav-link">Контакты</a></li>
            </ul>
        </nav>

        <div class="header-social">
            <a href="/" class="header-social-link" aria-label="Telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
            <a href="/" class="header-social-link" aria-label="Телефон">
                <i class="fa-solid fa-phone"></i>
            </a>
            <a href="/" class="header-social-link" aria-label="MAX">
                <img src="./icons/MAX.svg" alt="MAX" class="header-social-max-icon">
            </a>
        </div>

    </header>
    <main class="content">
        <h1 class="visually-hidden">Норма права</h1>
        <section class="banner">
            <h2 class="visually-hidden"> Записаться на консультацию</h2>
            <div class="banner-body">
                <div class="banner-info">
                ООО "Норма права"
                </div>
                <div class="banner-more-info">
                    Проконсультируем по любым вопросам в законодательной
                    и страховых сферах, представим ваши интересы в
                    службе финансового уполномоченного и суде.
                </div>
                <button class="banner-button"
                        type="button"
                        title="Consult">
                    Получить бесплатную консультацию
                </button>
                <img class="banner-arrow-image"
                     src="./images/icon-arrow-down.png" alt="Стрелочка"
                     width="30" height="30">
            </div>
        </section>
    </body>
</html>
